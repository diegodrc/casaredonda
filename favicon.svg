<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Circular base / foundation -->
  <ellipse cx="32" cy="52" rx="26" ry="6" fill="#c4953a" opacity="0.35"/>

  <!-- Round house body -->
  <path d="M8 42 C8 42 8 28 32 28 C56 28 56 42 56 42 L56 50 C56 50 56 54 32 54 C8 54 8 50 8 50 Z" fill="#b85c38"/>

  <!-- Wood texture lines on house -->
  <path d="M12 36 C20 34 44 34 52 36" stroke="#9a4a2c" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M10 40 C18 38 46 38 54 40" stroke="#9a4a2c" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M9 44 C17 42 47 42 55 44" stroke="#9a4a2c" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M9 48 C17 46 47 46 55 48" stroke="#9a4a2c" stroke-width="0.8" fill="none" opacity="0.5"/>

  <!-- Conical roof -->
  <path d="M32 8 L6 30 C6 30 18 26 32 26 C46 26 58 30 58 30 Z" fill="#5c4033"/>

  <!-- Roof ridge lines -->
  <line x1="32" y1="8" x2="14" y2="28" stroke="#3e2a1e" stroke-width="0.7" opacity="0.4"/>
  <line x1="32" y1="8" x2="50" y2="28" stroke="#3e2a1e" stroke-width="0.7" opacity="0.4"/>
  <line x1="32" y1="8" x2="32" y2="28" stroke="#3e2a1e" stroke-width="0.7" opacity="0.4"/>

  <!-- Door -->
  <path d="M27 54 L27 40 C27 37 32 37 32 37 C32 37 37 37 37 40 L37 54" fill="#3e2a1e"/>
  <circle cx="35" cy="47" r="1" fill="#c4953a"/>

  <!-- Small window left -->
  <circle cx="18" cy="38" r="3.5" fill="#f5ebe0" opacity="0.7"/>
  <line x1="18" y1="34.5" x2="18" y2="41.5" stroke="#5c4033" stroke-width="0.7"/>
  <line x1="14.5" y1="38" x2="21.5" y2="38" stroke="#5c4033" stroke-width="0.7"/>

  <!-- Small window right -->
  <circle cx="46" cy="38" r="3.5" fill="#f5ebe0" opacity="0.7"/>
  <line x1="46" y1="34.5" x2="46" y2="41.5" stroke="#5c4033" stroke-width="0.7"/>
  <line x1="42.5" y1="38" x2="49.5" y2="38" stroke="#5c4033" stroke-width="0.7"/>

  <!-- Mountain silhouette behind -->
  <path d="M0 30 L10 18 L18 24 L28 12 L38 20 L48 14 L58 22 L64 16 L64 30 Z" fill="#5a6f4e" opacity="0.3"/>
</svg>
